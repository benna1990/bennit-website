name: Deploy to bennit.nl

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SFTP naar Strato
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rsync + sshpass
        run: sudo apt-get install -y sshpass rsync

      - name: Check server structuur na deploy
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} \
            "pwd && echo '---' && ls -la && echo '---' && ls -la htdocs/ 2>/dev/null || echo 'geen htdocs submap'"

      - name: Cleanup leftover htdocs/ submap op server
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} \
            "rm -rf ./htdocs/ 2>/dev/null; echo done"

      - name: Deploy via rsync over SSH
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.claude/' \
            --exclude='cgi-bin/' \
            --exclude='*.sql' \
            --exclude='*.zip' \
            --exclude='bennit.nl/' \
            ./ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:./
