    .error-num { font-size: clamp(6rem, 20vw, 12rem); font-weight: 700; letter-spacing: -0.04em; line-height: 1; color: transparent; -webkit-text-stroke: 1px rgba(249,115,22,0.3); position: relative; z-index: 1; }
    .error-title { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; letter-spacing: -0.03em; margin: 8px 0 16px; position: relative; z-index: 1; }
    .error-sub { color: var(--muted); max-width: 420px; line-height: 1.7; margin-bottom: 40px; position: relative; z-index: 1; }
    .error-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; position: relative; z-index: 1; }
    .error-links { margin-top: 48px; display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; position: relative; z-index: 1; }
    .error-links a { color: var(--muted); font-size: 0.875rem; transition: color 0.2s; }
    .error-links a:hover { color: var(--orange); }
  </style>
